name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: Test (Python 3.11, fast suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install package + test deps
        # [cli] for YAML config tests; pytest plugins for cov + anyio markers.
        # No [app]/[report]/[server] extras — the test suite must pass without them.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[cli]"
          pip install pytest pytest-cov pytest-anyio

      - name: Run fast test suite
        run: pytest -m "not slow"

  build:
    name: Build wheel + smoke-install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install built wheel into a fresh venv
        run: |
          python -m venv smoketest
          ./smoketest/bin/pip install --upgrade pip
          ./smoketest/bin/pip install dist/*.whl

      - name: lattice --help
        run: ./smoketest/bin/lattice --help

      - name: README quick-start smoke test (against installed wheel)
        # -o addopts="" overrides the project's pytest config (which expects
        # pytest-cov) so the smoke venv can stay minimal.
        run: |
          ./smoketest/bin/pip install pytest
          ./smoketest/bin/pytest tests/test_readme_smoke.py -v -o addopts=""
